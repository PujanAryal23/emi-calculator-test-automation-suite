name: EMI Calculator Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: Which tier to run
        required: true
        default: regression
        type: choice
        options: [smoke, sanity, regression, extended]

jobs:
  smoke:
    name: Smoke (chromium)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: playwright install --with-deps chromium
      - run: pytest -m smoke -n 2 --browser chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: |
            reports/
            test-results/

  sanity:
    name: Sanity (chromium)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: playwright install --with-deps chromium
      - run: pytest -m "smoke or sanity" -n 4 --browser chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-report
          path: |
            reports/
            test-results/

  regression:
    name: Regression (${{ matrix.browser }})
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tier == 'regression')
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: playwright install --with-deps ${{ matrix.browser }}
      - run: pytest -m "regression or sanity or smoke" -n 4 --browser ${{ matrix.browser }} --reruns 1 --reruns-delay 2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.browser }}
          path: |
            reports/
            test-results/

  extended:
    name: Extended (weekly)
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'extended'
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: playwright install --with-deps ${{ matrix.browser }}
      - run: pytest -m "extended or regression or sanity or smoke" -n 6 --browser ${{ matrix.browser }} --reruns 1 --reruns-delay 2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extended-report-${{ matrix.browser }}
          path: |
            reports/
            test-results/
