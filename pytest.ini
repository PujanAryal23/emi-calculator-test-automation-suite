[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html

# --- Logging ---
# Terminal: INFO during the run so you can watch what the suite is doing.
# Override with `--log-cli-level=DEBUG` when chasing a flake.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-7s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S

# Per-run file capture (full DEBUG): archived as a CI artifact alongside
# the HTML report. Tail this to reconstruct any failure end-to-end.
log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-7s] %(name)s:%(lineno)d — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

markers =
    smoke: minimal happy-path checks that must always pass; run on every PR (< 2 min)
    sanity: P0 coverage across modules; run on merge to main (< 10 min)
    regression: full P0+P1 suite; run nightly and pre-release
    extended: perf, a11y, mobile, cross-browser matrix; run weekly
    calculation: validates site EMI against formula oracle
    boundary: BVA tests at slider/input limits
    negative: invalid input handling
    cross_feature: chart/table/excel consistency checks
    slow: marks tests > 10s
    flaky: quarantined; investigated separately
